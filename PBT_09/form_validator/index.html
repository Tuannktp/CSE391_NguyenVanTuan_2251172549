<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Validate Form Real-time</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>

    <div class="form-container">
        <h2>Đăng Ký Tài Khoản</h2>
        <form id="registerForm">
            <div class="form-group">
                <label>Họ và tên:</label>
                <div class="input-wrapper">
                    <input type="text" id="username" placeholder="Nhập từ 2 - 50 ký tự" required>
                    <span class="status-icon" id="usernameIcon"></span>
                </div>
                <small class="error-msg" id="usernameError"></small>
            </div>

            <div class="form-group">
                <label>Email:</label>
                <input type="email" id="email" placeholder="example@gmail.com" required>
                <small class="error-msg" id="emailError"></small>
            </div>

            <div class="form-group">
                <label>Mật khẩu:</label>
                <input type="password" id="password" placeholder="Nhập mật khẩu" required>
                <div class="strength-bar-container">
                    <div id="strengthBar" class="strength-bar"></div>
                </div>
                <small id="strengthText" class="strength-text"></small>
            </div>

            <div class="form-group">
                <label>Xác nhận mật khẩu:</label>
                <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu" required>
                <small class="error-msg" id="confirmPasswordError"></small>
            </div>

            <div class="form-group">
                <label>Số điện thoại:</label>
                <input type="text" id="phone" placeholder="Ví dụ: 0901-234-567" maxlength="12" required>
                <small class="error-msg" id="phoneError"></small>
            </div>

            <button type="submit" id="submitBtn" disabled>Đăng Ký</button>
        </form>
    </div>

    <div id="successModal" class="modal">
        <div class="modal-content">
            <h3>🎉 Đăng Ký Thành Công!</h3>
            <div id="modalData"></div>
            <button id="closeModalBtn">Đóng</button>
        </div>
    </div>

    <script src="app2.js"></script>
</body>
</html>
