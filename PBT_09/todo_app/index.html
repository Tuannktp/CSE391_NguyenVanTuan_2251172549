<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="app-header">
      <h1>Todo App</h1>
      <p>Organize your day with clean todos.</p>
    </header>

    <section class="todo-panel">
      <div class="todo-input-wrapper">
        <input id="todoInput" type="text" placeholder="What needs to be done?" autocomplete="off" />
        <button id="addTodoBtn" type="button">Add</button>
      </div>

      <div class="todo-controls">
        <div class="filters">
          <button class="filter-btn active" data-filter="all">All</button>
          <button class="filter-btn" data-filter="active">Active</button>
          <button class="filter-btn" data-filter="completed">Completed</button>
        </div>
        <button id="clearCompleted" class="clear-btn">Clear completed</button>
      </div>

      <ul id="todoList" class="todo-list" aria-label="Todo list"></ul>

      <div class="todo-footer">
        <span id="todoCount">0 items left</span>
      </div>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
