<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>E-Commerce Grid Layout - TLU</title>
    <link rel="stylesheet" href="grid.css">
</head>
<body>

    <div class="grid-container">
        <header class="header">
            <div class="logo">TLU E-SHOP</div>
            <nav>Home | Products | Contact</nav>
        </header>

        <section class="hero">
            <h1>BIG SALE - UP TO 50%</h1>
            <p>Khám phá bộ sưu tập công nghệ mới nhất</p>
        </section>

        <aside class="sidebar">
            <h3>Bộ lọc sản phẩm</h3>
            <div class="filter-group">
                <label><input type="checkbox"> Laptop Gaming</label>
                <label><input type="checkbox"> Phụ kiện PC</label>
                <label><input type="checkbox"> Màn hình</label>
                <label><input type="checkbox"> Bàn phím cơ</label>
            </div>
        </aside>

        <main class="main-content">
            <div class="product-grid">
                <div class="card">Card 1</div>
                <div class="card">Card 2</div>
                <div class="card">Card 3</div>
                <div class="card">Card 4</div>
                <div class="card">Card 5</div>
                <div class="card">Card 6</div>
            </div>
        </main>

        <aside class="ads">
            <div class="ads-banner">
                ADVERTISEMENT<br>BANNER
            </div>
        </aside>

        <footer class="footer">
            <p>&copy; 2026 TLU Computer Science Student. All rights reserved.</p>
        </footer>
    </div>

</body>
</html>
