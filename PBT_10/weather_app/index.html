<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Weather App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-container">
    <header class="app-header">
      <h1>🌤️ Weather App</h1>
      <p>Search weather by city</p>
    </header>

    <div class="search-panel">
      <div class="search-box">
        <input id="cityInput" type="text" placeholder="Enter city name..." aria-label="City name" />
        <button id="searchBtn" type="button" aria-label="Search weather">Search</button>
      </div>
    </div>

    <div id="weather-result" class="weather-result hidden"></div>
    <div id="error-msg" class="error-msg hidden"></div>

    <div class="history-section">
      <h3>Recent Searches</h3>
      <div id="history-list" class="history-list"></div>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
