<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Đăng Ký Thành Viên</title>
    <style>
        /* Style đơn giản cho sinh viên mới học tuần 2 */
        body {
            background-color: #f0f0f0; /* Màu nền xám nhạt */
            font-family: Arial, sans-serif;
            padding: 20px;
        }

        h1 {
            color: darkblue;
            text-align: center;
        }

        form {
            background-color: white;
            padding: 20px;
            border: 2px solid #000; /* Viền đen rõ rệt */
            max-width: 600px;
            margin: auto;
        }

        fieldset {
            margin-bottom: 15px;
            border: 1px solid blue;
        }

        legend {
            font-weight: bold;
            color: red;
        }

        .form-group {
            margin-bottom: 10px;
        }

        label {
            display: block; /* Để label nằm trên ô nhập */
            font-weight: bold;
            margin-bottom: 5px;
        }

        /* Ô nhập liệu cơ bản */
        input[type="text"], 
        input[type="email"], 
        input[type="tel"], 
        input[type="date"], 
        input[type="password"], 
        select, 
        textarea {
            width: 95%;
            padding: 8px;
            border: 1px solid #ccc;
        }

        /* Nút bấm đơn giản */
        .btn-group {
            text-align: center;
            margin-top: 20px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
        }

        .btn-submit {
            background-color: green;
            color: white;
        }

        .btn-reset {
            background-color: orange;
            color: black;
        }
    </style>
</head>
<body>

    <h1>Form Đăng Ký Hệ Thống</h1>

    <form action="#" method="POST">
        
        <fieldset>
            <legend>Thông tin cá nhân</legend>
            
            <div class="form-group">
                <label for="fullname">Họ tên:</label>
                <input type="text" id="fullname" name="fullname" required placeholder="Nhập họ và tên">
            </div>

            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" required placeholder="vidu@gmail.com">
            </div>

            <div class="form-group">
                <label for="phone">Số điện thoại:</label>
                <input type="tel" id="phone" name="phone" placeholder="Nhập 10 chữ số">
            </div>

            <div class="form-group">
                <label for="dob">Ngày sinh:</label>
                <input type="date" id="dob" name="dob" max="2026-05-06">
            </div>
        </fieldset>

        <fieldset>
            <legend>Tài khoản</legend>
            
            <div class="form-group">
                <label for="username">Tên đăng nhập:</label>
                <input type="text" id="username" name="username" placeholder="Chữ cái hoặc số">
            </div>

            <div class="form-group">
                <label for="password">Mật khẩu:</label>
                <input type="password" id="password" name="password" placeholder="Ít nhất 8 ký tự">
            </div>
        </fieldset>

        <fieldset>
            <legend>Thông tin giao hàng</legend>

            <div class="form-group">
                <label for="city">Thành phố:</label>
                <select id="city" name="city">
                    <option value="">-- Chọn Thành phố --</option>
                    <option value="hanoi">Hà Nội</option>
                    <option value="hcm">TP. Hồ Chí Minh</option>
                </select>
            </div>

            <div class="form-group">
                <label>Giới tính:</label>
                <input type="radio" id="male" name="gender" value="male"> Nam
                <input type="radio" id="female" name="gender" value="female"> Nữ
            </div>

            <div class="form-group">
                <label for="address">Địa chỉ chi tiết:</label>
                <textarea id="address" name="address" rows="3" placeholder="Số nhà, tên đường..."></textarea>
            </div>
        </fieldset>

        <div class="form-group">
            <input type="checkbox" id="terms" name="terms" required>
            <label for="terms" style="display: inline;">Tôi đồng ý với điều khoản</label>
        </div>

        <div class="btn-group">
            <button type="submit" class="btn-submit">Đăng ký ngay</button>
            <button type="reset" class="btn-reset">Xóa form</button>
        </div>

    </form>

</body>
</html>
