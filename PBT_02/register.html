<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Đăng Ký Thành Viên</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; padding: 20px; max-width: 800px; margin: auto; }
        fieldset { margin-bottom: 20px; padding: 15px; border: 1px solid #ccc; border-radius: 8px; }
        legend { font-weight: bold; padding: 0 10px; color: #2c3e50; }
        .form-group { margin-bottom: 12px; }
        label { display: block; margin-bottom: 5px; font-weight: 500; }
        input, select, textarea { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ddd; border-radius: 4px; }
        input[type="radio"], input[type="checkbox"] { width: auto; margin-right: 10px; }
        .radio-group { display: flex; gap: 20px; align-items: center; }
        .btn-group { margin-top: 20px; display: flex; gap: 10px; }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 4px; }
        button[type="submit"] { background-color: #27ae60; color: white; }
        button[type="reset"] { background-color: #e74c3c; color: white; }
    </style>
</head>
<body>

    <h1>Form Đăng Ký Hệ Thống</h1>

    <form action="#" method="POST">
        
        <!-- Fieldset 1: Thông tin cá nhân -->
        <fieldset>
            <legend>Thông tin cá nhân</legend>
            
            <div class="form-group">
                <label for="fullname">Họ tên:</label>
                <input type="text" id="fullname" name="fullname" 
                       required minlength="2" maxlength="50" 
                       placeholder="Nhập họ và tên đầy đủ">
            </div>

            <div class="form-group">
                <label for="email">Email:</label>
                <input type="email" id="email" name="email" 
                       required placeholder="example@gmail.com">
            </div>

            <div class="form-group">
                <label for="phone">Số điện thoại:</label>
                <input type="tel" id="phone" name="phone" 
                       pattern="[0-9]{10}" placeholder="Nhập 10 chữ số">
            </div>

            <div class="form-group">
                <label for="dob">Ngày sinh:</label>
                <input type="date" id="dob" name="dob" 
                       max="2026-05-06" placeholder="Chọn ngày sinh">
                <!-- Lưu ý: Thuộc tính max cần update thủ công hoặc dùng JS để lấy ngày hiện tại -->
            </div>
        </fieldset>

        <!-- Fieldset 2: Tài khoản -->
        <fieldset>
            <legend>Tài khoản</legend>
            
            <div class="form-group">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" 
                       pattern="[A-Za-z0-9_]{3,20}" 
                       placeholder="Chữ cái, số, underscore (3-20 ký tự)">
            </div>

            <div class="form-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" 
                       minlength="8" 
                       pattern="(?=.*[A-Z])(?=.*[0-9]).{8,}"
                       placeholder="Ít nhất 1 chữ hoa + 1 số">
            </div>

            <div class="form-group">
                <label for="confirm_password">Xác nhận password:</label>
                <input type="password" id="confirm_password" name="confirm_password" 
                       minlength="8" 
                       pattern="(?=.*[A-Z])(?=.*[0-9]).{8,}"
                       placeholder="Nhập lại mật khẩu">
            </div>
        </fieldset>

        <!-- Fieldset 3: Thông tin giao hàng -->
        <fieldset>
            <legend>Thông tin giao hàng</legend>

            <div class="form-group">
                <label for="city">Thành phố:</label>
                <select id="city" name="city">
                    <option value="">-- Chọn Thành phố --</option>
                    <option value="hanoi">Hà Nội</option>
                    <option value="hcm">TP. Hồ Chí Minh</option>
                    <option value="danang">Đà Nẵng</option>
                    <option value="haiphong">Hải Phòng</option>
                    <option value="cantho">Cần Thơ</option>
                </select>
            </div>

            <div class="form-group">
                <label for="district">Quận/Huyện:</label>
                <select id="district" name="district">
                    <option value="">-- Chọn Quận/Huyện --</option>
                    <option value="q1">Quận 1</option>
                    <option value="q2">Quận Cầu Giấy</option>
                </select>
            </div>

            <div class="form-group">
                <label for="address">Địa chỉ chi tiết:</label>
                <textarea id="address" name="address" rows="3" 
                          placeholder="Số nhà, tên đường..."></textarea>
            </div>

            <div class="form-group">
                <label>Giới tính:</label>
                <div class="radio-group">
                    <input type="radio" id="male" name="gender" value="male">
                    <label for="male">Nam</label>
                    
                    <input type="radio" id="female" name="gender" value="female">
                    <label for="female">Nữ</label>
                    
                    <input type="radio" id="other" name="gender" value="other">
                    <label for="other">Khác</label>
                </div>
            </div>
        </fieldset>

        <div class="form-group">
            <input type="checkbox" id="terms" name="terms" required>
            <label for="terms" style="display: inline;">Tôi đồng ý với điều khoản dịch vụ</label>
        </div>

        <div class="btn-group">
            <button type="submit">Đăng ký ngay</button>
            <button type="reset">Xóa form</button>
        </div>

    </form>

</body>
</html>
