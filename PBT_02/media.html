<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trang Sản Phẩm Multimedia</title>
    <style>
        /* Style đơn giản nhất cho sinh viên mới học */
        body {
            background-color: lightgray; /* Màu nền xám nhạt cho cả trang */
            font-family: Arial, sans-serif;
            margin: 20px;
        }

        header {
            background-color: darkblue; /* Màu xanh đậm cho nổi bật */
            color: white; /* Chữ trắng */
            text-align: center;
            padding: 10px;
        }

        section {
            background-color: white; /* Khung trắng cho nội dung */
            margin-top: 20px;
            padding: 15px;
            border: 1px solid black; /* Viền đen đơn giản */
        }

        h2 {
            color: darkblue;
            text-decoration: underline; /* Gạch chân tiêu đề */
        }

        img {
            width: 300px; /* Cố định kích thước ảnh cho dễ quản lý */
            border: 2px solid gray;
        }

        footer {
            text-align: center;
            margin-top: 30px;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <header>
        <h1>Showroom Công Nghệ TLU</h1>
    </header>

    <section>
        <h2>Bộ sưu tập sản phẩm</h2>
        
        <figure>
            <img src="https://picsum.photos/id/1/300/200" alt="Laptop">
            <figcaption>Laptop Pro - Hiệu năng đỉnh cao</figcaption>
        </figure>

        <figure>
            <img src="https://picsum.photos/id/160/300/200" alt="Smartphone">
            <figcaption>Smartphone X - Chụp ảnh đẹp</figcaption>
        </figure>
    </section>

    <section>
        <h2>Video giới thiệu YouTube</h2>
        <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" 
                width="560" height="315" 
                style="border: 0;"
                title="Video san pham">
        </iframe>
    </section>

    <section>
        <h2>Video Review trực tiếp</h2>
        <video width="400" controls>
            <source src="movie.mp4" type="video/mp4">
            Trình duyệt không hỗ trợ video.
        </video>
    </section>

    <section>
        <h2>Đăng ký thông tin</h2>
        <form action="#">
            <p>
                <label for="hoten">Họ và tên:</label>
                <input type="text" id="hoten" name="hoten">
            </p>
            <p>
                <label for="dob">Ngày sinh:</label>
                <input type="date" id="dob" name="dob">
            </p>
            <input type="submit" value="Gửi thông tin">
        </form>
    </section>

    <section>
        <h2>Nhạc nền giới thiệu</h2>
        <audio controls>
            <source src="background-music.mp3" type="audio/mpeg">
            Trình duyệt không hỗ trợ audio.
        </audio>
    </section>

    <footer>
        <p>&copy; 2026 - Bài tập Web tuần 1 - Sinh viên TLU</p>
    </footer>

</body>
</html>
